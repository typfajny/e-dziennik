<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprawdziany</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="teacher-page">
  <main class="panel teacher-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Panel nauczyciela</p>
        <h1>Sprawdziany</h1>
      </div>
      <button id="logout" type="button">Wyloguj</button>
    </header>

    <section class="split-grid">
      <div>
        <div class="calendar-toolbar">
          <div>
            <label for="month">Miesiąc</label>
            <input id="month" type="month">
          </div>
          <button id="new-exam" type="button">+ Dodaj</button>
        </div>
        <div id="calendar" class="calendar" aria-live="polite"></div>
      </div>

      <aside class="section-band">
        <h2 id="form-title">Nowy termin</h2>
        <form id="exam-form">
          <input id="exam-id" type="hidden">
          <div class="field">
            <label for="typ">Typ sprawdzianu</label>
            <select id="typ">
              <option value="Kartkówka">Kartkówka</option>
              <option value="Sprawdzian">Sprawdzian</option>
            </select>
          </div>
          <div class="field">
            <label for="date">Odbędzie się</label>
            <input id="date" type="date" required>
          </div>
          <div class="field">
            <label for="description">Opis</label>
            <input id="description" placeholder="Opis sprawdzianu" required>
          </div>
          <button id="save-exam" type="submit">Zapisz</button>
          <p id="status" class="error" aria-live="polite"></p>
        </form>
      </aside>
    </section>

    <a href="panel.html">Wróć do panelu</a>
  </main>

  <script type="module">
    import { db } from "../firebase.js";
    import { requireRole, setupLogout } from "../js/guard.js";
    import {
      byId,
      clear,
      createElement,
      currentMonthKey,
      dateKey,
      formatDate,
      formatDateTime,
      monthDays
    } from "../js/helpers.js";

    import {
      addDoc,
      collection,
      deleteDoc,
      doc,
      getDocs,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const monthInput = byId("month");
    const calendar = byId("calendar");
    const form = byId("exam-form");
    const formTitle = byId("form-title");
    const examId = byId("exam-id");
    const typeInput = byId("typ");
    const dateInput = byId("date");
    const descriptionInput = byId("description");
    const status = byId("status");
    const newExam = byId("new-exam");
    const weekdays = ["Pon", "Wt", "Śr", "Czw", "Pt", "Sob", "Nd"];
    let exams = [];

    function setStatus(message = "", ok = false) {
      status.textContent = message;
      status.className = ok ? "success" : "error";
    }

    function resetForm(date = "") {
      formTitle.textContent = "Nowy termin";
      form.reset();
      examId.value = "";
      dateInput.value = date;
      setStatus();
    }

    function editExam(exam) {
      formTitle.textContent = "Edytuj termin";
      examId.value = exam.id;
      typeInput.value = exam.typ || "Kartkówka";
      dateInput.value = dateKey(exam.odbedzieSie || exam.data);
      descriptionInput.value = exam.opis || "";
      setStatus();
      descriptionInput.focus();
    }

    async function removeExam(exam) {
      if (!confirm("Usunąć ten sprawdzian?")) {
        return;
      }

      await deleteDoc(doc(db, "sprawdziany", exam.id));
      await loadExams();
    }

    function renderEvent(exam) {
      const event = createElement("article", {
        className: "calendar-event",
        children: [
          createElement("strong", { text: exam.typ || "Sprawdzian" }),
          createElement("p", { text: `Wystawiono: ${formatDateTime(exam.zaplanowano || exam.dodano)}` }),
          createElement("p", { text: `Odbędzie się: ${formatDate(exam.odbedzieSie || exam.data)}` }),
          createElement("p", { className: "muted", text: exam.opis || "Brak opisu" })
        ]
      });
      const actions = createElement("div", { className: "event-actions" });
      const edit = createElement("button", { className: "icon-button", text: "✎", attrs: { type: "button", title: "Edytuj" } });
      const remove = createElement("button", { className: "icon-button", text: "×", attrs: { type: "button", title: "Usuń" } });
      edit.addEventListener("click", () => editExam(exam));
      remove.addEventListener("click", () => removeExam(exam));
      actions.append(edit, remove);
      event.append(actions);
      return event;
    }

    function renderCalendar() {
      clear(calendar);
      weekdays.forEach((weekday) => calendar.append(createElement("div", { className: "calendar-weekday", text: weekday })));

      monthDays(monthInput.value).forEach((day) => {
        if (!day) {
          calendar.append(createElement("div", { className: "calendar-day is-empty" }));
          return;
        }

        const key = dateKey(day);
        const dayEvents = exams.filter((exam) => dateKey(exam.odbedzieSie || exam.data) === key);
        const cell = createElement("section", { className: "calendar-day" });
        const header = createElement("div", { className: "calendar-date" });
        header.append(createElement("span", { text: String(day.getDate()) }));

        if (!dayEvents.length) {
          const add = createElement("button", { className: "icon-button", text: "+", attrs: { type: "button", title: "Dodaj sprawdzian" } });
          add.addEventListener("click", () => resetForm(key));
          header.append(add);
        }

        cell.append(header);
        dayEvents.forEach((exam) => cell.append(renderEvent(exam)));
        calendar.append(cell);
      });
    }

    async function loadExams() {
      const snapshot = await getDocs(collection(db, "sprawdziany"));
      exams = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderCalendar();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus();

      const payload = {
        typ: typeInput.value,
        data: dateInput.value,
        odbedzieSie: dateInput.value,
        opis: descriptionInput.value.trim(),
        updatedAt: serverTimestamp()
      };

      if (!payload.data || !payload.opis) {
        setStatus("Uzupełnij datę i opis.");
        return;
      }

      if (examId.value) {
        await updateDoc(doc(db, "sprawdziany", examId.value), payload);
      } else {
        await addDoc(collection(db, "sprawdziany"), {
          ...payload,
          zaplanowano: serverTimestamp(),
          dodano: serverTimestamp()
        });
      }

      setStatus("Zapisano.", true);
      resetForm(payload.data);
      await loadExams();
    });

    newExam.addEventListener("click", () => resetForm(`${monthInput.value}-01`));
    monthInput.addEventListener("change", renderCalendar);

    monthInput.value = currentMonthKey();
    requireRole("nauczyciel", loadExams);
    setupLogout();
  </script>
</body>
</html>
