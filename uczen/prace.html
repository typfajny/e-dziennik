<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prace domowe</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="student-page">
  <main class="panel student-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Panel ucznia</p>
        <h1>Prace domowe</h1>
      </div>
      <button id="logout" type="button">Wyloguj</button>
    </header>

    <section id="lista" aria-live="polite">
      <p class="empty-state">Ładowanie prac domowych...</p>
    </section>

    <a href="panel.html">Wróć do panelu</a>
  </main>

  <script type="module">
    import { db } from "../firebase.js";
    import { requireRole, setupLogout } from "../js/guard.js";
    import {
      createElement,
      formatDate,
      formatDateTime,
      renderEmpty,
      sortByDateDesc
    } from "../js/helpers.js";

    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const list = document.getElementById("lista");

    function renderHomework(homework) {
      return createElement("article", {
        className: "card",
        children: [
          createElement("h3", { text: "Praca domowa" }),
          createElement("p", { text: `Dodana: ${formatDateTime(homework.zaplanowano || homework.data)}` }),
          createElement("p", { text: `Do kiedy: ${formatDate(homework.termin)}` }),
          createElement("p", { className: "muted", text: `Opis: ${homework.opis || "Brak opisu"}` })
        ]
      });
    }

    requireRole("uczen", async () => {
      const snapshot = await getDocs(collection(db, "prace_domowe"));
      const homework = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));

      if (!homework.length) {
        renderEmpty(list, "Nie ma jeszcze prac domowych.");
        return;
      }

      list.replaceChildren(...sortByDateDesc(homework, ["termin", "data"]).map(renderHomework));
    });

    setupLogout();
  </script>
</body>
</html>
